# OpenOccupancy-nuScenes 分支：fast=opusv2t / slow=opusv2l，OPUS top-3 logits 已落盘。
# 网格 512×512×40 太大无法直接演化，编码器一层 stride=(2,2,2) 下采样到 256×256×20，
# 主干（FuncG/Solver/warp）在 1/2 分辨率上算，解码器 3×3×3 + trilinear ↑2 + DW3×3×3 + PW
# 还原回全分辨率，再与 fast logits 残差融合。
#
# 默认仅 2Hz、2s 演化（fast_frame_stride=3，监督帧 t-1.5/t-1.0/t-0.5/t）。
# 关闭 fast_kl 与 ray loss：yaml 中不写 train.lambda_fast_kl / loss.ray / data.ray_sidecar_dir。

data:
  # 使用 OpenOccupancy GT 解析（17 类，sparse .npy → dense + noise mask）。
  dataset_variant: openoccupancy
  # sample_token → (scene_token, lidar_sd_token) 映射，由 scripts/build_oo_token_map.py 生成。
  oo_token_map_path: configs/online_ncde/oo_token_map.pkl
  logits_format: opus_sparse_topk
  # 直接复用现有 canonical pkl：时序 / pose / token 字段与 benchmark 无关；
  # frame_rel_paths / slow_logit_path 是相对路径，由 fast_logits_root / slow_logit_root 切到 OO 根目录；
  # GT 路径由 OO 专属 dataset 类用 sample_token → lidar_token 映射自行拼接，不依赖 pkl 内的 occ3d 风格 GT 路径。
  info_path: configs/online_ncde/canonical_infos_train_full.pkl
  val_info_path: configs/online_ncde/canonical_infos_val_full.pkl
  min_history_completeness: 4
  # 2Hz 演化：每 3 帧抽 1 帧，13 → 5 帧；supervision_step_indices [3,6,9,12] → [1,2,3,4]。
  fast_frame_stride: 3
  # fast 走 2Hz 抽帧后的精简目录（仅含 stride=3 keyframe，体积约为全集 1/3）。
  # 由 scripts/filter_oo_logits_to_2hz.py 从 data/logits_opusv2t_openocc 镜像生成。
  fast_logits_root: data/logits_opusv2t_openocc_2hz
  # slow 已是单帧 keyframe 输出，无 sweep 冗余，无需 2Hz 抽帧。
  slow_logit_root: data/logits_opusv2l_openocc
  opus_other_fill_value: -5.0
  opus_free_fill_value: 5.0
  # OpenOccupancy GT：data/nuscenes/occupancy/scene_<token>/occupancy/<lidar_token>.npy
  # （由专属 dataset 解析；这里只占位 gt_root 与 mask_key 名义字段。）
  gt_root: data/nuscenes/occupancy
  num_classes: 17
  free_index: 16
  pc_range: [-51.2, -51.2, -5.0, 51.2, 51.2, 3.0]
  voxel_size: [0.2, 0.2, 0.2]
  grid_size: [512, 512, 40]
  gt_mask_key: noise_mask
  timestamp_scale: 1.0e-6

model:
  # 触发下采样 aligner（encoder stride 一层 → 主干 256×256×20 → decoder 上采样回 512×512×40）。
  variant: ds2x_oo
  encoder_downsample_stride: [2, 2, 2]
  feat_dim: 32
  hidden_dim: 32
  encoder_in_channels: 17
  use_fast_residual: true
  decoder_init_scale: 1.0e-6
  func_g_inner_dim: 24
  func_g_body_dilations: [1, 3, 5]
  func_g_gn_groups: 8

loss:
  gamma: 2.0
  lambda_focal: 1.0
  lambda_lovasz: 1.0
  focal_mask_weight: 5.0
  # 17 维：参考 OPUS openoccupancy cls_weights ×10（对齐 alocc3d 量级），free=3。
  class_weights: [50, 100, 50, 50, 100, 100, 50, 100, 50, 50, 10, 50, 10, 10, 20, 10, 3]
  # ray loss 关闭：不写 ray 子段，build_loss 直接走纯 seg loss，不构造 RayLoss。

train:
  batch_size: 1
  # 单 sample dense 张量 ≈ 4.85 GB（5 fast + 1 slow fp32 + 5 GT）；
  # 6 workers × prefetch=1 → 6 个并发 ≈ 35 GB CPU 内存，91 GB 机器留 50+ GB 余量。
  # 云端 RAM 更大时可上调到 8。
  num_workers: 6
  epochs: 20
  lr: 1.0e-4
  warmup_epochs: 1
  warmup_start_lr: 1.0e-5
  weight_decay: 1.0e-2
  clip_norm: 5.0
  log_interval: 1000
  device: cuda
  supervision_labels: ["t-1.5", "t-1.0", "t-0.5", "t"]
  supervision_weights: [0.15, 0.20, 0.25, 0.40]
  supervision_weight_normalize: true
  ema:
    enabled: true
    decay: 0.999
  # fast_kl 关闭：不写 lambda_fast_kl，trainer 默认 0.0 即跳过 KL 计算。

dataloader:
  pin_memory: true
  # prefetch=1（每 worker 后台排 1 个，配合 num_workers=6 控制总并发到 6）。
  prefetch_factor: 1
  persistent_workers: false

eval:
  batch_size: 1
  num_workers: 6
  device: cuda
  free_conf_thresh: null
  log_interval: 500
  log_multistep_losses: true
  sweep_pkl: data/nuscenes/nuscenes_infos_val_sweep.pkl

wandb:
  entity: runheyang
  project: neural-ode
  name: ""
