# Canonical config for fast=opusv1t, slow=opusv2l.

data:
  # --- 新路径：逐帧 full logits + canonical_infos ---
  # logits_format: opus_sparse_full
  # info_path: configs/online_ncde/canonical_infos_train.pkl
  # val_info_path: configs/online_ncde/canonical_infos_val.pkl
  # fast_logits_root: data/logits_opusv1t_full
  # slow_logit_root: data/logits_opusv2l_full
  # opus_full_topk_k: 3
  # opus_other_fill_value: -5.0
  # opus_free_fill_value: 5.0
  # --- 旧路径（注释保留，切回时取消注释并删除上方新路径配置） ---
  info_path: configs/online_ncde/ncde_align_infos_train.pkl
  val_info_path: configs/online_ncde/ncde_align_infos_val.pkl
  train_supervision_sidecar_path: configs/online_ncde/ncde_align_infos_train_sup4_sidecar.pkl
  val_supervision_sidecar_path: configs/online_ncde/ncde_align_infos_val_sup4_sidecar.pkl
  fast_logits_root: data/logits_opusv1t
  slow_logit_root: data/logits_opusv2l
  fast_logits_variant: topk
  slow_logit_variant: topk
  full_logits_clamp_min: null
  topk_other_fill_value: -5.0
  topk_free_fill_value: 5.0
  hard_stats_path: configs/online_ncde/hard_oversample_train_stats.json
  gt_root: data/nuscenes/gts
  num_classes: 18
  free_index: 17
  pc_range: [-40.0, -40.0, -1.0, 40.0, 40.0, 5.4]
  voxel_size: [0.4, 0.4, 0.4]
  grid_size: [200, 200, 16]
  gt_mask_key: mask_camera
  slow_noise_std: 0.0
  timestamp_scale: 1.0e-6
  fast_occ_thresh: 0.25

model:
  feat_dim: 32
  hidden_dim: 32
  encoder_in_channels: 18
  # Default hidden-state resolution is 100x100x16 (XY downsampled by 2x).
  # true: residual paradigm (output adds fast logits, initial state is slow-fast0)
  # false: non-residual paradigm (output is decoder only, initial state is slow)
  use_fast_residual: true
  decoder_init_scale: 1.0e-6
  # FuncG-Heavy32x3:
  #   Stem: 1x1 Conv 64->32
  #   Body: 3x3 Conv 32->32, dilation=[1,2,3], residual
  #   Head: 1x1 Conv 32->32 + tanh
  func_g_inner_dim: 24
  func_g_body_dilations: [1, 2, 3]
  func_g_gn_groups: 8

loss:
  gamma: 2.0
  lambda_focal: 1.0
  lambda_lovasz: 1.0
  # focal 全区域监督：mask 内 ×5.0，mask 外 ×1.0；lovasz 仍只算 mask 内。
  # 设为 null 或删除此行则回退到原始 train with mask 行为。
  focal_mask_weight: 5.0
  class_weights: [125, 50, 100, 75, 50, 100, 125, 75, 125, 50, 50, 10, 50, 10, 10, 20, 10, 3]

train:
  batch_size: 1
  num_workers: 16
  epochs: 20
  lr: 1.0e-4
  warmup_epochs: 1
  warmup_start_lr: 1.0e-5
  weight_decay: 1.0e-2
  clip_norm: 5.0
  log_interval: 10
  device: cuda
  use_multistep_supervision: true
  supervision_labels: ["t-1.5", "t-1.0", "t-0.5", "t"]
  supervision_weights: [0.15, 0.20, 0.25, 0.40]
  # supervision_weights: [0.0, 0.0, 0.0, 1.0]
  supervision_weight_normalize: true

dataloader:
  pin_memory: true
  prefetch_factor: 2
  persistent_workers: false

eval:
  batch_size: 1
  num_workers: 16
  device: cuda
  free_conf_thresh: null
  log_interval: 20
  log_multistep_losses: true
  amp_fp16: false

wandb:
  entity: runheyang
  project: neural-ode
  name: ""
