# 1s_tminus1 preset：以同目录 train.yaml 为基底，仅覆盖 rollout / 监督权重等差异字段。
# 未覆盖的字段（loss.ray、loss.focal_mask_weight 等）跟随 train.yaml 当前默认。
base_config: ./train.yaml

model:
  func_g_inner_dim: 32

loss:
  lambda_focal: 0.5

train:
  rollout_mode: one_second_tminus1
  max_step_index: 6
  supervision_weights: [0.50, 0.50, 0.0, 0.0]

dataloader:
  persistent_workers: true

eval:
  primary_supervision_label: t-1.0
