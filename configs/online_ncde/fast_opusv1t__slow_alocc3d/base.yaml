# Canonical config for fast=opusv1t (opus_sparse_full), slow=alocc3d (alocc_dense_topk).
# 混合组合：fast 沿用 fast_opusv1t__slow_opusv2l 的 OPUS 稀疏路径，
# slow 替换为 ALOCC3D dense top-k。两者共用同一套 canonical_infos pkl。

data:
  # 混合 loader：fast/slow 格式不同，由 CompositeLogitsLoader 路由
  logits_format: composite
  fast_logits_format: opus_sparse_full
  slow_logit_format: alocc_dense_topk
  info_path: configs/online_ncde/canonical_infos_train.pkl
  val_info_path: configs/online_ncde/canonical_infos_val.pkl
  # Ray first-hit sidecar（train_*, val_* 共用一个目录）。非空则启用 RayLoss。
  ray_sidecar_dir: data/online_ncde_ray_sidecar
  fast_logits_root: data/logits_opusv1t_full
  slow_logit_root: data/alocc3d_wo_mask
  # OPUS 端参数（作用于 fast）
  opus_full_topk_k: 3
  opus_other_fill_value: -5.0
  opus_free_fill_value: 5.0
  # ALOCC 端参数（作用于 slow）
  alocc_fill_value: -5.0
  alocc_clamp_min: -5.0
  alocc_topk_k: 3
  alocc_max_centering: false
  # 通用参数
  gt_root: data/nuscenes/gts
  num_classes: 18
  free_index: 17
  pc_range: [-40.0, -40.0, -1.0, 40.0, 40.0, 5.4]
  voxel_size: [0.4, 0.4, 0.4]
  grid_size: [200, 200, 16]
  gt_mask_key: mask_camera
  timestamp_scale: 1.0e-6

model:
  feat_dim: 32
  hidden_dim: 32
  encoder_in_channels: 18
  use_fast_residual: true
  decoder_init_scale: 1.0e-6
  func_g_inner_dim: 24
  func_g_body_dilations: [1, 2, 3]
  func_g_gn_groups: 8

loss:
  gamma: 2.0
  lambda_focal: 1.0
  lambda_lovasz: 1.0
  focal_mask_weight: 5.0
  class_weights: [125, 50, 100, 75, 50, 100, 125, 75, 125, 50, 50, 10, 50, 10, 10, 20, 10, 3]
  ray:
    # 对齐 fast_alocc2dmini__slow_alocc3d：仅启用 hit，其余 ray 子项关闭。
    lambda_ray: 0.2
    lambda_hit: 0.3
    lambda_empty: 0.0
    lambda_pre_free: 0.0
    lambda_depth: 0.0
    num_samples: 50
    step_m: 0.4
    window_voxels: 1
    near_max_m: 10.0
    mid_max_m: 20.0
    near_weight: 2.0
    mid_weight: 1.0
    depth_asym_far: 2.0
    depth_asym_near: 1.0
    smooth_l1_beta: 1.0
    gt_dist_bias_m: null

train:
  batch_size: 1
  num_workers: 16
  epochs: 20
  lr: 1.0e-4
  warmup_epochs: 1
  warmup_start_lr: 1.0e-5
  weight_decay: 1.0e-2
  clip_norm: 5.0
  log_interval: 1000
  device: cuda
  supervision_labels: ["t-1.5", "t-1.0", "t-0.5", "t"]
  supervision_weights: [0.15, 0.20, 0.25, 0.40]
  supervision_weight_normalize: true
  ema:
    enabled: true
    decay: 0.999
  # L_kl = λ * mean(m_occ.clamp(min=0) * KL(aligned || fast.detach()))，conf-加权 trust region
  lambda_fast_kl: 3.0

dataloader:
  pin_memory: true
  prefetch_factor: 2
  persistent_workers: false

eval:
  batch_size: 1
  num_workers: 16
  device: cuda
  free_conf_thresh: null
  log_interval: 500
  log_multistep_losses: true
  amp_fp16: false
  sweep_pkl: data/nuscenes/nuscenes_infos_val_sweep.pkl

wandb:
  entity: runheyang
  project: neural-ode
  name: ""
