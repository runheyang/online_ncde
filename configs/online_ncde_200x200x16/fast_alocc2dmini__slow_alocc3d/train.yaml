# Online NCDE 200x200x16 全分辨率变体配置。
# 继承原始 100x100x16 配置。
base_config: ../../online_ncde/fast_alocc2dmini__slow_alocc3d/train.yaml

model:
  # 200x200x16 全分辨率下扩大 func_g 感受野
  func_g_body_dilations: [1, 3, 5]

train:
  num_workers: 12
  # L_kl = λ * mean(m_occ.clamp(min=0) * KL(aligned || fast.detach()))，conf-加权 trust region
  lambda_fast_kl: 0.0
